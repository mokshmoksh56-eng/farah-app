<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يومية الورشة 2026 - نظام 12 ساعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        header h1 { margin: 0; font-size: 1.5rem; font-weight: 800; }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .card h3 { font-size: 0.9rem; margin: 0; color: #64748b; font-weight: 600; }
        .card .value { font-size: 1.3rem; font-weight: 800; margin-top: 5px; }

        /* Toast */
        #toast {
            visibility: hidden; min-width: 250px; background-color: var(--success); color: #fff;
            text-align: center; border-radius: 8px; padding: 12px; position: fixed;
            z-index: 1000; top: 30px; left: 50%; transform: translateX(-50%);
            font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }

        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }

        /* Form */
        .form-section {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: 'Cairo';
            font-size: 15px;
            outline: none;
        }

        .in-field { border-right: 6px solid var(--success) !important; font-weight: bold; color: var(--success); }
        .out-field { border-right: 6px solid var(--danger) !important; font-weight: bold; color: var(--danger); }

        .btn-save {
            grid-column: span 3;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
        }

        .btn-edit-active { background: var(--warning); }

        /* Table */
        .tools-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        .table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8fafc; padding: 15px; font-size: 15px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 15px; }

        .td-in { color: var(--success); font-weight: 800; background: #f0fdf4; }
        .td-out { color: var(--danger); font-weight: 800; background: #fef2f2; }
        .badge { background: #e2e8f0; padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 600; }

        .time-cell { font-size: 13px; color: #475569; direction: ltr; display: block; font-weight: 600; }

        .action-btns button { border: none; background: none; cursor: pointer; font-size: 20px; margin: 0 5px; }

        @media (max-width: 600px) {
            .form-section { grid-template-columns: 1fr; }
            .btn-save { grid-column: span 1; }
            .dashboard { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div id="toast">تم الحفظ بنجاح ✓</div>

<div class="container">
    <header>
        <h1>حسابات الورشة والمحلات 2026</h1>
    </header>

    <div class="dashboard">
        <div class="card"><h3>صافي اليوم</h3><div class="value" id="day-total" style="color:var(--success)">0</div></div>
        <div class="card"><h3>صافي الشهر</h3><div class="value" id="month-total" style="color:var(--primary)">0</div></div>
        <div class="card"><h3>إجمالي المصاريف</h3><div class="value" id="year-out" style="color:var(--danger)">0</div></div>
        <div class="card"><h3>الرصيد الكلي</h3><div class="value" id="year-net">0</div></div>
    </div>

    <div class="form-section">
        <select id="entry-shop">
            <option value="زبون">👤 زبون خارجي</option>
            <option value="عاملون فرح">👷 عاملون فرح</option>
            <option>السيد ياسين</option>
            <option>محمد عبد الله</option>
            <option>هاني رخام</option>
            <option>أحمد رخام</option>
            <option>السعيد تال</option>
            <option>هاني زجاج</option>
            <option>مصاريف نثرية</option>
        </select>
        <input type="text" id="entry-customer" list="cust-list" placeholder="اسم الزبون/المحل">
        <datalist id="cust-list"></datalist>
        <input type="datetime-local" id="entry-date">
        <input type="text" id="entry-desc" placeholder="البيان (التفاصيل)">
        <input type="number" id="entry-in" class="in-field" placeholder="مبلغ داخل (+)">
        <input type="number" id="entry-out" class="out-field" placeholder="مبلغ خارج (-)">
        <input type="hidden" id="edit-id" value="">
        <button class="btn-save" id="btn-main" onclick="processEntry()">حفظ العملية</button>
        <button id="btn-cancel" onclick="resetForm()" style="display:none; grid-column: span 3; font-size:14px; background:#64748b; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; margin-top:-5px;">إلغاء التعديل</button>
    </div>

    <div class="tools-row">
        <input type="text" id="searchBox" placeholder="🔍 بحث عن اسم أو بيان..." onkeyup="loadData()" style="width: 280px;">
        <button onclick="exportToCSV()" style="background:#059669; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">📥 تصدير ملف Excel</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width:160px">التاريخ والوقت</th>
                    <th>الجهة</th>
                    <th>الاسم</th>
                    <th>البيان</th>
                    <th>داخل</th>
                    <th>خارج</th>
                    <th style="width:100px">إجراء</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    window.onload = function() { setActualTime(); loadData(); };

    function setActualTime() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('entry-date').value = now.toISOString().slice(0, 16);
    }

    // وظيفة تحويل الوقت لنظام 12 ساعة
    function formatDateTime12H(dateTimeStr) {
        const dateObj = new Date(dateTimeStr);
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, '0');
        const d = String(dateObj.getDate()).padStart(2, '0');
        
        let hours = dateObj.getHours();
        const minutes = String(dateObj.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'مساءً' : 'صباحاً';
        
        hours = hours % 12;
        hours = hours ? hours : 12; // الساعة 0 تصبح 12
        
        return `${y}/${m}/${d} <br> <span class="time-cell">${hours}:${minutes} ${ampm}</span>`;
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.style.backgroundColor = isError ? "#dc2626" : "#059669";
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
    }

    function processEntry() {
        const shop = document.getElementById('entry-shop').value;
        const customer = document.getElementById('entry-customer').value || "عام";
        const date = document.getElementById('entry-date').value;
        const desc = document.getElementById('entry-desc').value || "-";
        const inVal = parseFloat(document.getElementById('entry-in').value) || 0;
        const outVal = parseFloat(document.getElementById('entry-out').value) || 0;
        const editId = document.getElementById('edit-id').value;

        if (inVal === 0 && outVal === 0) { showToast("برجاء إدخال مبلغ!", true); return; }

        let data = JSON.parse(localStorage.getItem('workshop_pro_v12h')) || [];
        if (editId) {
            const index = data.findIndex(item => item.id == editId);
            if (index !== -1) data[index] = { ...data[index], shop, customer, date, desc, inVal, outVal };
            showToast("تم تحديث البيانات");
        } else {
            data.push({ shop, customer, date, desc, inVal, outVal, id: Date.now() });
            showToast("تم الحفظ بنجاح ✓");
        }

        localStorage.setItem('workshop_pro_v12h', JSON.stringify(data));
        resetForm();
        loadData();
    }

    function loadData() {
        const tableBody = document.getElementById('table-body');
        const searchVal = document.getElementById('searchBox').value.toLowerCase();
        const data = JSON.parse(localStorage.getItem('workshop_pro_v12h')) || [];
        const custDatalist = document.getElementById('cust-list');
        
        tableBody.innerHTML = "";
        custDatalist.innerHTML = "";
        let uniqueCusts = new Set();
        let totals = { day: 0, month: 0, yearOut: 0, yearNet: 0 };
        const now = new Date();

        data.slice().sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((item) => {
            const rowDate = new Date(item.date);
            const isToday = rowDate.toDateString() === now.toDateString();
            const isThisMonth = rowDate.getMonth() === now.getMonth() && rowDate.getFullYear() === now.getFullYear();

            if (isToday) totals.day += (item.inVal - item.outVal);
            if (isThisMonth) totals.month += (item.inVal - item.outVal);
            totals.yearOut += item.outVal;
            totals.yearNet += (item.inVal - item.outVal);

            if (item.customer !== "عام") uniqueCusts.add(item.customer);

            if (item.customer.toLowerCase().includes(searchVal) || item.desc.toLowerCase().includes(searchVal) || item.shop.includes(searchVal)) {
                const row = `<tr>
                    <td>${formatDateTime12H(item.date)}</td>
                    <td><span class="badge">${item.shop}</span></td>
                    <td style="font-weight:700;">${item.customer}</td>
                    <td>${item.desc}</td>
                    <td class="td-in">${item.inVal > 0 ? item.inVal.toLocaleString() : '-'}</td>
                    <td class="td-out">${item.outVal > 0 ? item.outVal.toLocaleString() : '-'}</td>
                    <td class="action-btns">
                        <button onclick="startEdit(${item.id})">📝</button>
                        <button onclick="deleteItem(${item.id})">🗑️</button>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
            }
        });

        document.getElementById('day-total').innerText = totals.day.toLocaleString();
        document.getElementById('month-total').innerText = totals.month.toLocaleString();
        document.getElementById('year-out').innerText = totals.yearOut.toLocaleString();
        document.getElementById('year-net').innerText = totals.yearNet.toLocaleString();
        uniqueCusts.forEach(c => custDatalist.innerHTML += `<option value="${c}">`);
    }

    function startEdit(id) {
        const data = JSON.parse(localStorage.getItem('workshop_pro_v12h'));
        const item = data.find(i => i.id == id);
        if (item) {
            document.getElementById('entry-shop').value = item.shop;
            document.getElementById('entry-customer').value = item.customer;
            document.getElementById('entry-date').value = item.date;
            document.getElementById('entry-desc').value = item.desc;
            document.getElementById('entry-in').value = item.inVal;
            document.getElementById('entry-out').value = item.outVal;
            document.getElementById('edit-id').value = item.id;
            document.getElementById('btn-main').innerText = "تحديث البيانات";
            document.getElementById('btn-main').classList.add('btn-edit-active');
            document.getElementById('btn-cancel').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('entry-customer').value = "";
        document.getElementById('entry-desc').value = "";
        document.getElementById('entry-in').value = "";
        document.getElementById('entry-out').value = "";
        document.getElementById('btn-main').innerText = "حفظ العملية";
        document.getElementById('btn-main').classList.remove('btn-edit-active');
        document.getElementById('btn-cancel').style.display = "none";
        setActualTime();
    }

    function deleteItem(id) {
        if(confirm("هل أنت متأكد من حذف هذا السجل؟")) {
            let data = JSON.parse(localStorage.getItem('workshop_pro_v12h'));
            data = data.filter(item => item.id !== id);
            localStorage.setItem('workshop_pro_v12h', JSON.stringify(data));
            loadData();
            showToast("تم الحذف", true);
        }
    }

    function exportToCSV() {
        const data = JSON.parse(localStorage.getItem('workshop_pro_v12h')) || [];
        let csvContent = "data:text/csv;charset=utf-8,\uFEFFالتاريخ,الجهة,الاسم,البيان,داخل,خارج\n";
        data.forEach(item => csvContent += `${item.date},${item.shop},${item.customer},${item.desc},${item.inVal},${item.outVal}\n`);
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", "يومية_الورشة_2026.csv");
        document.body.appendChild(link);
        link.click();
    }
</script>

</body>
</html>
