<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة حضور طلخا - تعديل وحذف</title>
    <style>
        :root { --turquoise: #008b8b; --danger: #d32f2f; --green: #2e7d32; --blue: #007bff; --orange: #fd7e14; --light-sky: #e0ffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f4; margin: 0; padding: 8px; color: #1a1a1a; }
        .container { max-width: 100%; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        
        .header { background: linear-gradient(135deg, var(--turquoise) 0%, #00ced1 100%); color: white; padding: 15px 10px; text-align: center; border-bottom: 3px solid #005f5f; }
        #digital-clock { font-size: 40px; font-weight: 800; font-family: monospace; display: block; color: var(--light-sky); }
        .date-box { font-size: 22px; font-weight: bold; margin-top: 5px; color: white; }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px; background: #f0f7f7; }
        .dash-card { background: white; padding: 10px 2px; border-radius: 10px; text-align: center; border: 1px solid #d1e0e0; }
        .dash-label { font-size: 10px; color: #666; font-weight: bold; display: block; }
        .dash-val { font-size: 14px; font-weight: 800; color: var(--turquoise); }

        .user-fields { padding: 12px; display: grid; grid-template-columns: 2fr 1fr; gap: 8px; }
        .info-input { width: 100%; border: 2px solid #eee; border-radius: 8px; padding: 10px; font-size: 15px; font-weight: bold; outline: none; }

        .actions { padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .punch-btn { background: var(--turquoise); box-shadow: 0 4px 0 #005f5f; }
        .punch-btn:disabled { background: #bbb; box-shadow: none; cursor: not-allowed; }
        
        .vacation-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-reg { background: var(--blue); }
        .btn-emg { background: var(--orange); }
        .btn-manual { background: #fff; border: 2px dashed var(--turquoise); color: var(--turquoise); padding: 10px; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        .table-wrap { padding: 0 8px 15px; max-height: 280px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center; }
        th { background: #e0f2f2; padding: 12px 5px; color: var(--turquoise); border-bottom: 2px solid var(--turquoise); position: sticky; top: 0; }
        td { padding: 10px 2px; border-bottom: 1px solid #eee; font-weight: bold; }

        .row-actions { display: flex; gap: 8px; justify-content: center; }
        .edit-btn { color: var(--turquoise); cursor: pointer; font-size: 16px; background: none; border: none; }
        .del-btn { color: var(--danger); cursor: pointer; font-size: 16px; background: none; border: none; }

        .footer { padding: 20px; text-align: center; font-size: 12px; color: #aaa; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <div class="header">
        <span id="digital-clock">00:00:00</span>
        <div class="date-box" id="full-date">-- / -- / ----</div>
    </div>

    <div class="dashboard">
        <div class="dash-card"><span class="dash-label">كود البصمة</span><span id="dash-id" class="dash-val">---</span></div>
        <div class="dash-card"><span class="dash-label">وقت الحضور</span><span id="today-punch" class="dash-val">--:--</span></div>
        <div class="dash-card"><span class="dash-label">تأخير شهري</span><span id="sum-late" class="dash-val" style="color:var(--danger)">0</span></div>
        <div class="dash-card"><span class="dash-label">دقائق متبقية</span><span id="rem-mins" class="dash-val" style="color:var(--green)">60</span></div>
        <div class="dash-card"><span class="dash-label">إعتيادي</span><span id="reg-left" class="dash-val">30</span></div>
        <div class="dash-card"><span class="dash-label">عارضة</span><span id="emg-left" class="dash-val">7</span></div>
    </div>

    <div class="user-fields">
        <input type="text" id="u-name" class="info-input" placeholder="اسم الموظف" oninput="save()">
        <input type="text" id="u-id" class="info-input" placeholder="الكود" oninput="save()">
    </div>

    <div class="actions">
        <button id="main-punch-btn" class="btn-main punch-btn" onclick="handlePunch(null, null, false)">تسجيل بصمة الآن 📲</button>
        
        <div class="vacation-group">
            <button class="btn-main btn-reg" onclick="addVacation('اعتيادي')">إجازة إعتيادي</button>
            <button class="btn-main btn-emg" onclick="addVacation('عارضة')">إجازة عارضة</button>
        </div>
        
        <button id="manual-btn" class="btn-manual" onclick="manualEntry()">نسيت أسجل (حتى ٢ ظ) ✍️</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>الوقت</th>
                    <th>الحالة</th>
                    <th>تحكم</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <div class="footer">
        منظومة محطة طلخا الرقمية - إصدار التحكم الكامل
        <br>
        <span onclick="resetAll()" style="color:#ddd; cursor:pointer; text-decoration:underline;">تصفير السجل</span>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('talkha_db')) || [];
    let vacations = JSON.parse(localStorage.getItem('talkha_vacs')) || [];

    function init() {
        document.getElementById('u-name').value = localStorage.getItem('u_name') || "";
        document.getElementById('u-id').value = localStorage.getItem('u_id') || "";
        updateTime();
        setInterval(updateTime, 1000);
        render();
    }

    function fixNums(str) {
        if(!str) return "";
        let s = str.toString();
        const persianNums = [/٠/g, /١/g, /٢/g, /٣/g, /٤/g, /٥/g, /٦/g, /٧/g, /٨/g, /٩/g];
        for (let i = 0; i < 10; i++) s = s.replace(persianNums[i], i);
        return s;
    }

    function getFormattedDate() {
        const now = new Date();
        return now.getDate() + " / " + (now.getMonth() + 1) + " / " + now.getFullYear();
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('digital-clock').innerText = now.toLocaleTimeString('en-GB');
        document.getElementById('full-date').innerText = getFormattedDate();
    }

    function handlePunch(mH, mM, isManual) {
        const now = new Date();
        const h = mH !== null ? mH : now.getHours();
        const m = mM !== null ? mM : now.getMinutes();
        const totalMins = h * 60 + m;
        const dateKey = now.toDateString();

        if (db.find(e => e.fullDate === dateKey) || vacations.find(e => e.fullDate === dateKey)) {
            alert("⚠️ مسجل لك حالة اليوم بالفعل!");
            return;
        }

        const limitMins = isManual ? 840 : 490;
        if (totalMins > limitMins) { alert("تجاوزت الوقت المسموح!"); return; }

        const late = totalMins > 475 ? totalMins - 475 : 0;
        const timeStr = (h % 12 || 12) + ":" + (m < 10 ? '0' + m : m) + (h >= 12 ? ' م' : ' ص');

        db.unshift({
            id: Date.now(),
            fullDate: dateKey,
            displayDate: getFormattedDate(),
            time: timeStr,
            late: late,
            type: 'work'
        });

        localStorage.setItem('talkha_db', JSON.stringify(db));
        render();
    }

    function manualEntry() {
        let input = prompt("أدخل وقت الحضور (مثال ٧.٣٠):");
        if (input) {
            input = fixNums(input).replace(':', '.'); 
            const parts = input.split('.');
            if (parts.length === 2) {
                let h = parseInt(parts[0]);
                let m = parseInt(parts[1]);
                if (h >= 1 && h < 7) h += 12; 
                if (!isNaN(h) && !isNaN(m)) handlePunch(h, m, true);
            }
        }
    }

    function addVacation(type) {
        const now = new Date();
        const dateKey = now.toDateString();
        if (db.find(e => e.fullDate === dateKey) || vacations.find(e => e.fullDate === dateKey)) {
            alert("مسجل لك حالة اليوم بالفعل!");
            return;
        }
        if (confirm(`تسجيل اليوم ${type}؟`)) {
            vacations.unshift({
                id: Date.now(),
                fullDate: dateKey,
                displayDate: getFormattedDate(),
                time: '---',
                late: 0,
                type: type
            });
            localStorage.setItem('talkha_vacs', JSON.stringify(vacations));
            render();
        }
    }

    function editRow(id) {
        let item = db.find(i => i.id === id) || vacations.find(i => i.id === id);
        if(!item) return;

        if (item.type === 'work') {
            let newTime = prompt("تعديل وقت الحضور (مثال ٨.١٥):", fixNums(item.time));
            if (newTime) {
                newTime = fixNums(newTime).replace(':', '.');
                const parts = newTime.split('.');
                if (parts.length === 2) {
                    let h = parseInt(parts[0]);
                    let m = parseInt(parts[1]);
                    if (h >= 1 && h < 7) h += 12;
                    let totalMins = h * 60 + m;
                    item.late = totalMins > 475 ? totalMins - 475 : 0;
                    item.time = (h % 12 || 12) + ":" + (m < 10 ? '0' + m : m) + (h >= 12 ? ' م' : ' ص');
                }
            }
        } else {
            let newType = confirm("هل تريد تحويل الإجازة؟ \n موافق = اعتيادي | إلغاء = عارضة");
            item.type = newType ? "اعتيادي" : "عارضة";
        }
        
        localStorage.setItem('talkha_db', JSON.stringify(db));
        localStorage.setItem('talkha_vacs', JSON.stringify(vacations));
        render();
    }

    function deleteRow(id) {
        if(confirm("حذف هذا التسجيل؟")) {
            db = db.filter(i => i.id !== id);
            vacations = vacations.filter(i => i.id !== id);
            localStorage.setItem('talkha_db', JSON.stringify(db));
            localStorage.setItem('talkha_vacs', JSON.stringify(vacations));
            render();
        }
    }

    function render() {
        const body = document.getElementById('log-body');
        const nowKey = new Date().toDateString();
        body.innerHTML = '';
        let totalLate = 0, regCount = 0, emgCount = 0, todayTime = "--:--", foundToday = false;

        document.getElementById('dash-id').innerText = fixNums(document.getElementById('u-id').value) || "---";

        const all = [...db, ...vacations].sort((a,b) => b.id - a.id);

        all.forEach(entry => {
            if (entry.type === 'work') totalLate += entry.late;
            if (entry.type === 'اعتيادي') regCount++;
            if (entry.type === 'عارضة') emgCount++;

            if (entry.fullDate === nowKey) { todayTime = entry.time; foundToday = true; }

            body.innerHTML += `
                <tr style="background:${entry.type!=='work'?'#fff9f0':''}">
                    <td>${entry.displayDate}</td>
                    <td>${entry.time}</td>
                    <td style="color:${entry.late > 0 ? 'red' : (entry.type==='work'?'green':'blue')}">
                        ${entry.type === 'work' ? (entry.late > 0 ? entry.late + ' د' : 'منتظم') : entry.type}
                    </td>
                    <td class="row-actions">
                        <button class="edit-btn" onclick="editRow(${entry.id})">✍️</button>
                        <button class="del-btn" onclick="deleteRow(${entry.id})">🗑️</button>
                    </td>
                </tr>`;
        });

        document.getElementById('main-punch-btn').disabled = foundToday;
        document.getElementById('main-punch-btn').innerText = foundToday ? "تم التسجيل اليوم ✅" : "تسجيل بصمة الآن 📲";
        document.getElementById('manual-btn').style.display = foundToday ? "none" : "block";

        document.getElementById('sum-late').innerText = totalLate;
        document.getElementById('rem-mins').innerText = Math.max(0, 60 - totalLate);
        document.getElementById('reg-left').innerText = 30 - regCount;
        document.getElementById('emg-left').innerText = 7 - emgCount;
        document.getElementById('today-punch').innerText = todayTime;
    }

    function save() {
        localStorage.setItem('u_name', document.getElementById('u-name').value);
        localStorage.setItem('u_id', document.getElementById('u-id').value);
        render();
    }

    function resetAll() {
        if (confirm("⚠️ تصفير السجل بالكامل؟")) { localStorage.clear(); location.reload(); }
    }
</script>
</body>
</html>
