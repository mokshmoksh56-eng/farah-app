<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة حضور محطة طلخا - الإصدار الصافي</title>
    <style>
        :root { --turquoise: #008b8b; --danger: #d32f2f; --green: #2e7d32; --light-sky: #e0ffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f4; margin: 0; padding: 8px; color: #1a1a1a; }
        
        .container { max-width: 100%; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }

        /* الهيدر الفيروزي */
        .header { background: linear-gradient(135deg, var(--turquoise) 0%, #00ced1 100%); color: white; padding: 15px 10px; text-align: center; border-bottom: 3px solid #005f5f; }
        .main-logo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid white; margin-bottom: 8px; background: white; }
        #digital-clock { font-size: 38px; font-weight: 800; font-family: monospace; display: block; color: var(--light-sky); line-height: 1.1; }
        #ampm { font-size: 16px; font-weight: bold; display: block; margin-top: 2px; }
        .date-display { font-size: 13px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 10px; display: inline-block; margin-top: 8px; }

        .branding-text { padding: 8px; text-align: center; background: #fff; border-bottom: 1px solid #eee; }
        .station-name { font-size: 15px; font-weight: bold; color: var(--turquoise); }

        /* مدخلات البيانات */
        .user-fields { padding: 12px; }
        .field-row label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 4px; }
        .info-input { width: 100%; border: 1.5px solid #ddd; border-radius: 8px; padding: 10px; font-size: 16px; font-weight: bold; color: var(--turquoise); outline: none; margin-bottom: 10px; }

        /* الدرجات الوظيفية */
        .grade-box { display: flex; gap: 8px; padding: 0 12px 12px; }
        .g-btn { flex: 1; padding: 10px; border: 1.5px solid var(--turquoise); background: white; color: var(--turquoise); border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .g-btn.active { background: var(--turquoise); color: white; }

        /* لوحة البيانات */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #f0f7f7; }
        .dash-card { background: white; padding: 10px 5px; border-radius: 10px; text-align: center; border: 1px solid #d1e0e0; }
        .dash-label { font-size: 11px; color: #666; font-weight: bold; display: block; margin-bottom: 2px; }
        .dash-val { font-size: 18px; font-weight: 800; color: var(--turquoise); }

        /* الأزرار */
        .actions { padding: 12px; }
        .btn-punch { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; background: var(--turquoise); color: white; margin-bottom: 8px; transition: 0.2s; box-shadow: 0 3px 0 #005f5f; }
        .btn-punch:active { transform: translateY(2px); box-shadow: none; }
        .btn-manual { width: 100%; padding: 8px; border: 1px dashed #999; border-radius: 8px; font-size: 13px; background: transparent; color: #666; font-weight: bold; }

        /* الجدول */
        .table-wrap { padding: 0 8px 12px; max-height: 180px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #e0f2f2; padding: 8px 4px; border-bottom: 2px solid var(--turquoise); color: var(--turquoise); }
        td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #eee; font-weight: bold; }

        .footer { padding: 10px; text-align: center; font-size: 11px; color: #999; border-top: 1px solid #eee; }
        .reset-link { color: #ccc; text-decoration: underline; margin-top: 5px; display: block; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <div class="header">
        <img src="https://i.ibb.co/Xf8N7S7/Talkha-Logo.jpg" alt="Logo" class="main-logo">
        <span id="digital-clock">00:00:00</span>
        <span id="ampm">---</span>
        <div id="full-date" class="date-display">...</div>
    </div>

    <div class="branding-text">
        <div style="font-size: 10px; color:#888;">شركة وسط الدلتا لإنتاج الكهرباء</div>
        <div class="station-name">محطة كهرباء طلخا المركبة</div>
    </div>

    <div class="user-fields">
        <div class="field-row">
            <label>اسم الموظف:</label>
            <input type="text" id="u-name" class="info-input" placeholder="اكتب اسمك" oninput="save()">
        </div>
        <div class="field-row">
            <label>رقم البصمة:</label>
            <input type="number" id="u-id" class="info-input" placeholder="كودك الخاص" oninput="save()">
        </div>
    </div>

    <div class="grade-box">
        <button id="g1" class="g-btn active" onclick="setGrade(1)">الدرجة الأولى</button>
        <button id="g2" class="g-btn" onclick="setGrade(2)">الدرجة الثانية</button>
    </div>

    <div class="dashboard">
        <div class="dash-card">
            <span class="dash-label">الانصراف</span>
            <span id="leave-disp" class="dash-val">--:--</span>
        </div>
        <div class="dash-card">
            <span class="dash-label">متبقي للانصراف</span>
            <span id="countdown-text" class="dash-val" style="font-size: 14px;">...</span>
        </div>
        <div class="dash-card">
            <span class="dash-label">تأخيرك (د)</span>
            <span id="sum-late" class="dash-val" style="color: var(--danger);">0</span>
        </div>
        <div class="dash-card">
            <span class="dash-label">رصيد متبقي</span>
            <span id="rem-disp" class="dash-val" style="color: var(--green);">60</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-punch" onclick="punch(null)">تسجيل بصمة الآن 📲</button>
        <button class="btn-manual" onclick="manual()">نسيت أسجل ✍️</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>اليوم</th>
                    <th>الوقت</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <div class="footer">
        <div id="days-left">...</div>
        <span class="reset-link" onclick="reset()">تصفير سجل الشهر</span>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('talkha_clean_db')) || [];
    let grade = localStorage.getItem('u_grade') || 1;

    function init() {
        document.getElementById('u-name').value = localStorage.getItem('u_name') || "";
        document.getElementById('u-id').value = localStorage.getItem('u_id') || "";
        setGrade(grade);
        render();
        updateTime();
        setInterval(updateTime, 1000);
    }

    function updateTime() {
        const now = new Date();
        let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
        const ampmStr = h >= 12 ? 'مساءً' : 'صباحاً';
        document.getElementById('digital-clock').innerText = pad(h%12||12)+":"+pad(m)+":"+pad(s);
        document.getElementById('ampm').innerText = ampmStr;
        document.getElementById('full-date').innerText = now.toLocaleDateString('ar-EG', {weekday:'long', day:'numeric', month:'long'});

        const mins = h*60+m, leaveMins = grade==1?835:840;
        const cd = document.getElementById('countdown-text');
        if (mins < 420) cd.innerText = "يبدأ 07:00 ص";
        else if (mins <= 475) cd.innerText = `مبكر بـ ${475-mins} د`;
        else if (mins < leaveMins) {
            const r = leaveMins - mins;
            cd.innerText = `${Math.floor(r/60)}س و ${r%60}د`;
        } else cd.innerText = "انتهى اليوم";
    }

    function pad(n) { return n < 10 ? '0' + n : n; }

    function setGrade(g) {
        grade = g; localStorage.setItem('u_grade', g);
        document.getElementById('g1').className = g==1?'g-btn active':'g-btn';
        document.getElementById('g2').className = g==2?'g-btn active':'g-btn';
        document.getElementById('leave-disp').innerText = g==1?'01:55 م':'02:00 م';
    }

    function punch(mH, mM) {
        const now = new Date();
        const h = mH!==null?mH:now.getHours(), m = mM!==null?mM:now.getMinutes();
        const mins = h*60+m;
        if(now.getDay()===5){ alert("اليوم الجمعة إجازة"); return; }
        if(h<7){ alert("قبل موعد العمل (7 ص)"); return; }
        if(mins > 490){ alert("انتهى موعد الحضور (8:10 ص)"); return; }

        const late = mins > 475 ? mins - 475 : 0;
        db.unshift({
            day: now.toLocaleDateString('ar-EG',{weekday:'short'}),
            time: (h%12||12)+":"+pad(m)+(h>=12?' م':' ص'),
            late: late
        });
        localStorage.setItem('talkha_clean_db', JSON.stringify(db));
        render();
    }

    function render() {
        const body = document.getElementById('log-body'), sumL = document.getElementById('sum-late'), remD = document.getElementById('rem-disp');
        body.innerHTML = ''; let sum = 0;
        db.forEach(i => {
            sum += i.late;
            body.innerHTML += `<tr><td>${i.day}</td><td>${i.time}</td><td style="color:${i.late>0?'red':'green'}">${i.late>0?i.late+' د':'منتظم'}</td></tr>`;
        });
        sumL.innerText = sum; remD.innerText = Math.max(0, 60-sum);
        const now = new Date(), end = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        document.getElementById('days-left').innerText = `باقي ${end-now.getDate()} يوم بالشهر`;
    }

    function save() {
        localStorage.setItem('u_name', document.getElementById('u-name').value);
        localStorage.setItem('u_id', document.getElementById('u-id').value);
    }

    function manual() {
        const t = prompt("الوقت (مثال 07:55):");
        if(t && t.includes(":")) {
            const p = t.split(":");
            punch(parseInt(p[0]), parseInt(p[1]));
        }
    }

    function reset() {
        if(confirm("هل أنت متأكد من تصفير السجل لبدء شهر جديد؟")) {
            localStorage.removeItem('talkha_clean_db');
            location.reload();
        }
    }
</script>
</body>
</html>
