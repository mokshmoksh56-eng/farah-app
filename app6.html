<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة حضور محطة طلخا - الإصدار النهائي</title>
    <style>
        :root { --navy: #001f42; --danger: #ff0000; --green: #008000; --sky: #00d4ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Arial', sans-serif; background: #eaeff2; margin: 0; padding: 5px; color: #000; }
        
        .container { max-width: 100%; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; }

        /* الهيدر والشعار والساعة */
        .header { background: linear-gradient(135deg, var(--navy) 0%, #0056b3 100%); color: white; padding: 20px 10px; text-align: center; border-bottom: 5px solid var(--sky); }
        .main-logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--sky); margin-bottom: 10px; background: white; }
        #digital-clock { font-size: 60px; font-weight: 900; font-family: 'Courier New', monospace; display: block; color: var(--sky); line-height: 1; text-shadow: 3px 3px 0px #000; }
        #ampm { font-size: 26px; font-weight: bold; margin-top: 5px; display: block; }
        .date-display { font-size: 18px; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 12px; display: inline-block; margin-top: 10px; font-weight: 900; border: 2px solid var(--sky); }

        .branding-text { padding: 10px; text-align: center; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .station-name { font-size: 18px; font-weight: 900; color: var(--navy); }

        /* بيانات الموظف */
        .user-fields { padding: 15px; }
        .field-row label { display: block; font-size: 18px; font-weight: 900; color: #333; margin-bottom: 5px; }
        .info-input { width: 100%; border: 3px solid var(--navy); border-radius: 12px; padding: 12px; font-size: 22px; font-weight: 900; outline: none; margin-bottom: 15px; background: #fdfdfd; }

        /* اختيار الدرجة */
        .grade-box { display: flex; gap: 10px; padding: 0 15px 15px; }
        .g-btn { flex: 1; padding: 15px; border: 3px solid var(--navy); background: white; color: var(--navy); border-radius: 12px; font-size: 18px; font-weight: 900; cursor: pointer; }
        .g-btn.active { background: var(--navy); color: white; }

        /* لوحة البيانات والنتائج */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #eee; }
        .dash-card { background: white; padding: 15px 5px; border-radius: 15px; text-align: center; border: 2px solid #bbb; }
        .dash-label { font-size: 15px; color: #444; font-weight: 900; display: block; margin-bottom: 5px; }
        .dash-val { font-size: 32px; font-weight: 950; display: block; }

        /* الأزرار */
        .actions { padding: 20px; }
        .btn-punch { width: 100%; padding: 22px; border: none; border-radius: 20px; font-size: 28px; font-weight: 950; cursor: pointer; background: var(--navy); color: white; box-shadow: 0 6px 0 #00152e; margin-bottom: 10px; }
        .btn-punch:active { transform: translateY(4px); box-shadow: none; }
        .btn-manual { width: 100%; padding: 12px; border: 2px dashed #666; border-radius: 12px; font-size: 16px; font-weight: bold; background: #fff; cursor: pointer; }

        /* الجدول */
        .table-wrap { padding: 0 10px 20px; max-height: 250px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 18px; border: 2px solid #000; }
        th { background: #000; color: #fff; padding: 12px 5px; font-weight: 900; }
        td { padding: 15px 5px; text-align: center; border-bottom: 2px solid #ddd; font-weight: 900; }

        .footer { padding: 20px; text-align: center; font-size: 15px; font-weight: 900; color: #666; border-top: 2px solid #eee; }
        .reset-link { color: var(--danger); text-decoration: underline; margin-top: 15px; display: block; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <div class="header">
        <div class="logo-area">
            <img src="https://i.ibb.co/Xf8N7S7/Talkha-Logo.jpg" alt="Logo" class="main-logo">
        </div>
        <span id="digital-clock">00:00:00</span>
        <span id="ampm">---</span>
        <div id="full-date" class="date-display">...</div>
        <div id="countdown-text" style="font-size: 16px; color: #ffeb3b; margin-top: 10px; font-weight: 900;">...</div>
    </div>

    <div class="branding-text">
        <div style="font-size: 11px; color:#666;">شركة وسط الدلتا لإنتاج الكهرباء</div>
        <div class="station-name">محطة كهرباء طلخا المركبة</div>
    </div>

    <div class="user-fields">
        <div class="field-row">
            <label>اسم الموظف:</label>
            <input type="text" id="u-name" class="info-input" placeholder="ادخل الاسم هنا" oninput="save()">
        </div>
        <div class="field-row">
            <label>رقم البصمة:</label>
            <input type="number" id="u-id" class="info-input" placeholder="ادخل الكود هنا" oninput="save()">
        </div>
    </div>

    <div class="grade-box">
        <button id="g1" class="g-btn active" onclick="setGrade(1)">درجة أولى</button>
        <button id="g2" class="g-btn" onclick="setGrade(2)">درجة ثانية</button>
    </div>

    <div class="dashboard">
        <div class="dash-card">
            <span class="dash-label">الانصراف</span>
            <span id="leave-disp" class="dash-val" style="color: blue;">--:--</span>
        </div>
        <div class="dash-card">
            <span class="dash-label">تأخيرك (د)</span>
            <span id="sum-late" class="dash-val" style="color: var(--danger);">0</span>
        </div>
        <div class="dash-card">
            <span class="dash-label">متبقي (د)</span>
            <span id="rem-disp" class="dash-val" style="color: var(--green);">60</span>
        </div>
        <div class="dash-card">
            <span class="dash-label">التقييم</span>
            <span id="perf-disp" class="dash-val">⭐️</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-punch" onclick="punch(null)">تسجيل حضور الآن 📲</button>
        <button class="btn-manual" onclick="manual()">إدخال وقت يدوي (نسيت أسجل) ✍️</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>اليوم</th>
                    <th>الوقت</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <div class="footer">
        <div id="days-left">...</div>
        <span class="reset-link" onclick="reset()">⚠️ تصفير سجل الشهر بالكامل</span>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('talkha_final_v5')) || [];
    let grade = localStorage.getItem('u_grade') || 1;

    function init() {
        document.getElementById('u-name').value = localStorage.getItem('u_name') || "";
        document.getElementById('u-id').value = localStorage.getItem('u_id') || "";
        setGrade(grade);
        render();
        updateTime();
        setInterval(updateTime, 1000);
    }

    function updateTime() {
        const now = new Date();
        let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
        const ampmStr = h >= 12 ? 'مساءً' : 'صباحاً';
        document.getElementById('digital-clock').innerText = pad(h%12||12)+":"+pad(m)+":"+pad(s);
        document.getElementById('ampm').innerText = ampmStr;
        document.getElementById('full-date').innerText = now.toLocaleDateString('ar-EG', {weekday:'long', day:'numeric', month:'long'});

        const mins = h*60+m, leaveMins = grade==1?835:840;
        const cd = document.getElementById('countdown-text');
        if (mins < 420) cd.innerText = "موعد الحضور: 07:00 ص";
        else if (mins <= 475) cd.innerText = `مبكر بـ ${475-mins} دقيقة`;
        else if (mins < leaveMins) cd.innerText = `باقي ${Math.floor((leaveMins-mins)/60)}س و ${(leaveMins-mins)%60}د على الانصراف`;
        else cd.innerText = "انتهى وقت العمل الرسمي";
    }

    function pad(n) { return n < 10 ? '0' + n : n; }

    function setGrade(g) {
        grade = g; localStorage.setItem('u_grade', g);
        document.getElementById('g1').className = g==1?'g-btn active':'g-btn';
        document.getElementById('g2').className = g==2?'g-btn active':'g-btn';
        document.getElementById('leave-disp').innerText = g==1?'01:55 م':'02:00 م';
    }

    function punch(mH, mM) {
        const now = new Date();
        const h = mH!==null?mH:now.getHours(), m = mM!==null?mM:now.getMinutes();
        const mins = h*60+m;
        if(now.getDay()===5){ alert("اليوم الجمعة إجازة"); return; }
        if(h<7){ alert("الحضور يبدأ من 7 ص"); return; }
        if(mins > 490){ alert("تجاوزت 8:10 صباحاً"); return; }

        const late = mins > 475 ? mins - 475 : 0;
        db.unshift({
            day: now.toLocaleDateString('ar-EG',{weekday:'short'}),
            time: (h%12||12)+":"+pad(m)+(h>=12?' م':' ص'),
            late: late
        });
        localStorage.setItem('talkha_final_v5', JSON.stringify(db));
        render();
    }

    function render() {
        const body = document.getElementById('log-body'), sumL = document.getElementById('sum-late'), remD = document.getElementById('rem-disp');
        body.innerHTML = ''; let sum = 0;
        db.forEach(i => {
            sum += i.late;
            body.innerHTML += `<tr><td>${i.day}</td><td>${i.time}</td><td style="color:${i.late>0?'red':'green'}">${i.late>0?i.late+' د':'منتظم'}</td></tr>`;
        });
        sumL.innerText = sum; remD.innerText = Math.max(0, 60-sum);
        document.getElementById('perf-disp').innerText = sum < 15 ? "⭐️⭐️⭐️⭐️⭐️" : "⭐️⭐️⭐️⭐️";
        const now = new Date(), end = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        document.getElementById('days-left').innerText = `باقي ${end-now.getDate()} يوم على نهاية الشهر`;
    }

    function save() {
        localStorage.setItem('u_name', document.getElementById('u-name').value);
        localStorage.setItem('u_id', document.getElementById('u-id').value);
    }

    function manual() {
        const t = prompt("ادخل وقت الوصول (مثلاً 07:55):");
        if(t && t.includes(":")) {
            const p = t.split(":");
            punch(parseInt(p[0]), parseInt(p[1]));
        }
    }

    function reset() {
        if(confirm("⚠️ هل أنت متأكد من تصفير سجلات الشهر بالكامل؟")) {
            localStorage.removeItem('talkha_final_v5');
            location.reload();
        }
    }
</script>
</body>
</html>
