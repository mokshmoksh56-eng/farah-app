<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة حضور محطة طلخا - الإصدار النهائي</title>
    <style>
        :root { --navy: #002b5b; --gold: #c5a022; --danger: #d93025; --green: #1e8e3e; --sky: #00d4ff; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 10px; direction: rtl; margin: 0; color: #333; }
        .container { max-width: 500px; margin: 5px auto; background: white; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden; }
        
        .clock-header { background: linear-gradient(135deg, #001f42 0%, #004b93 100%); color: white; padding: 20px 10px; text-align: center; border-bottom: 5px solid var(--sky); }
        #digital-clock { font-size: 42px; font-weight: 900; font-family: 'Monaco', monospace; color: var(--sky); text-shadow: 0 0 20px rgba(0,212,255,0.4); }
        #ampm { font-size: 18px; margin-right: 10px; font-weight: bold; }
        .date-display { font-size: 14px; color: #e2f3f5; margin-top: 5px; font-weight: 600; background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 15px; display: inline-block; }
        #countdown-text { font-size: 12px; margin-top: 10px; display: block; opacity: 0.9; }

        .branding { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .station-title { font-size: 18px; font-weight: 800; color: var(--navy); }
        
        .user-info-grid { padding: 15px 20px; background: #fafafa; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-bottom: 1px solid #eee; }
        .info-group { display: flex; flex-direction: column; gap: 4px; }
        .info-group label { font-size: 11px; color: #888; font-weight: bold; }
        .info-input { border: 1px solid #ddd; border-radius: 8px; padding: 6px 10px; font-size: 13px; color: var(--navy); font-weight: bold; outline: none; }

        .grade-bar { background: #fff; padding: 12px; text-align: center; display: flex; justify-content: center; gap: 15px; }
        .g-btn { flex: 1; padding: 10px; border: 2px solid var(--navy); background: white; color: var(--navy); border-radius: 12px; cursor: pointer; font-weight: bold; }
        .g-btn.active { background: var(--navy); color: white; }

        .progress-section { padding: 10px 25px; background: #fff; }
        .progress-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; font-weight: bold; }
        .bar-bg { background: #e0e0e0; height: 12px; border-radius: 6px; overflow: hidden; }
        #progress-fill { background: var(--green); height: 100%; width: 0%; transition: 0.8s; }

        /* تعديل لوحة البيانات لتشمل إجمالي التأخير */
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: #f1f4f8; }
        .dash-card { background: white; padding: 10px 2px; border-radius: 15px; text-align: center; border: 1px solid #eef; }
        .dash-val { font-size: 13px; font-weight: 800; color: var(--navy); display: block; margin-top: 3px; }
        .dash-label { font-size: 8px; color: #999; font-weight: bold; }

        .actions { padding: 15px; }
        button.main-b { width: 100%; padding: 16px; border: none; border-radius: 18px; font-size: 18px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        .btn-punch { background: var(--navy); color: white; box-shadow: 0 8px 20px rgba(0,43,91,0.2); }
        .btn-manual { background: white; color: #666; border: 2px dashed #ccc; font-size: 14px; }
        
        #alert-box { margin: 0 20px 20px; padding: 15px; border-radius: 15px; font-size: 14px; text-align: center; display: none; }
        .warning { background: #fff3cd; color: #856404; } .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; } .info { background: #e2f3f5; color: #0c5460; }

        .table-wrap { padding: 0 15px 20px; max-height: 200px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { position: sticky; top: 0; background: #f8fafc; padding: 12px 5px; color: #64748b; }
        td { padding: 10px 5px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        
        .footer-info { display: flex; justify-content: space-between; padding: 10px 20px; background: #f8fafc; font-size: 10px; color: #999; border-top: 1px solid #eee; }
        .reset-btn { cursor: pointer; text-decoration: underline; color: #94a3b8; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <div class="clock-header">
        <span id="digital-clock">00:00:00</span><span id="ampm"></span>
        <div id="full-date" class="date-display">...</div>
        <div id="countdown-text">...</div>
    </div>

    <div class="branding">
        <div style="font-size: 11px; color:#94a3b8; font-weight: 600;">شركة وسط الدلتا لإنتاج الكهرباء</div>
        <div class="station-title">محطة كهرباء طلخا المركبة</div>
    </div>

    <div class="user-info-grid">
        <div class="info-group" style="grid-column: span 2;">
            <label>اسم الموظف</label>
            <input type="text" id="u-name" class="info-input" placeholder="ادخل الاسم" oninput="save()">
        </div>
        <div class="info-group">
            <label>رقم البصمة</label>
            <input type="number" id="u-id" class="info-input" placeholder="الكود" oninput="save()">
        </div>
        <div class="info-group">
            <label>رقم الهاتف</label>
            <input type="tel" id="u-tel" class="info-input" placeholder="الموبايل" oninput="save()">
        </div>
    </div>

    <div class="grade-bar">
        <button id="g1" class="g-btn active" onclick="setGrade(1)">درجة أولى</button>
        <button id="g2" class="g-btn" onclick="setGrade(2)">درجة ثانية</button>
    </div>

    <div class="progress-section">
        <div class="progress-meta">
            <span>رصيد التأخير المستهلك</span>
            <span id="p-label">0%</span>
        </div>
        <div class="bar-bg">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div class="dashboard">
        <div class="dash-card">
            <span class="dash-label">الانصراف</span>
            <span id="leave-disp" class="dash-val">...</span>
        </div>
        <div class="dash-card" style="border-right: 2px solid #eee;">
            <span class="dash-label">تأخيرك الكلي</span>
            <span id="sum-late" class="dash-val" style="color: var(--danger);">0 د</span>
        </div>
        <div class="dash-card">
            <span class="dash-label">الرصيد المتبقي</span>
            <span id="rem-disp" class="dash-val" style="color: var(--green);">60 د</span>
        </div>
        <div class="dash-card">
            <span class="dash-label">التقييم</span>
            <span id="perf-disp" class="dash-val">⭐️</span>
        </div>
    </div>

    <div class="actions">
        <button class="main-b btn-punch" onclick="punch(null)">تسجيل الحضور الآن 📲</button>
        <button class="main-b btn-manual" onclick="manual()">إدخال وقت وصول سابق</button>
    </div>

    <div id="alert-box"></div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>اليوم</th>
                    <th>التاريخ</th>
                    <th>الوقت</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <div class="footer-info">
        <span id="days-left">...</span>
        <span class="reset-btn" onclick="reset()">تصفير سجلات الشهر</span>
    </div>
</div>

<script>
    const holidays = ["1/1", "7/1", "25/1", "20/3", "21/3", "22/3", "13/4", "25/4", "1/5", "27/5", "28/5", "29/5", "30/5", "16/6", "30/6", "23/7", "25/8", "6/10"];
    let db = JSON.parse(localStorage.getItem('talkha_final_db')) || [];
    let grade = localStorage.getItem('u_grade') || 1;

    function init() {
        document.getElementById('u-name').value = localStorage.getItem('u_name') || "";
        document.getElementById('u-id').value = localStorage.getItem('u_id') || "";
        document.getElementById('u-tel').value = localStorage.getItem('u_tel') || "";
        setGrade(grade);
        setInterval(tick, 1000);
        render();
        updateFullDate();
    }

    function updateFullDate() {
        const now = new Date();
        document.getElementById('full-date').innerText = now.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    function save() {
        localStorage.setItem('u_name', document.getElementById('u-name').value);
        localStorage.setItem('u_id', document.getElementById('u-id').value);
        localStorage.setItem('u_tel', document.getElementById('u-tel').value);
    }

    function setGrade(g) {
        grade = g; localStorage.setItem('u_grade', g);
        document.getElementById('g1').className = g==1?'g-btn active':'g-btn';
        document.getElementById('g2').className = g==2?'g-btn active':'g-btn';
        document.getElementById('leave-disp').innerText = g==1?'01:55 م':'02:00 م';
    }

    function tick() {
        const now = new Date();
        const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
        document.getElementById('digital-clock').innerHTML = `${pad(h%12||12)}:${pad(m)}:${pad(s)}`;
        document.getElementById('ampm').innerHTML = h>=12?'مساءً':'صباحاً';
        
        const mins = h*60+m;
        const leaveMins = grade==1?835:840;
        const cd = document.getElementById('countdown-text');

        if(mins < 420) cd.innerText = "بانتظار موعد الحضور (07:00 ص)";
        else if(mins <= 475) cd.innerText = `مبكر بـ ${475-mins} دقيقة`;
        else if(mins < leaveMins) {
            const r = leaveMins - mins;
            cd.innerText = `باقي ${Math.floor(r/60)}س و ${r%60}د على الانصراف`;
        } else cd.innerText = "انتهى وقت العمل الرسمي";
        
        autoCheck(mins);
    }

    function punch(mH, mM) {
        const now = new Date();
        const h = mH!==null?mH:now.getHours(), m = mM!==null?mM:now.getMinutes();
        const mins = h*60+m;
        const name = document.getElementById('u-name').value || "يا موظف";

        if(isHol()) { msg(isHol(), "info"); return; }
        if(h < 7) { msg("⚠️ يبدأ التسجيل من 07:00 ص", "warning"); return; }
        if(mins > 490) { msg("🚫 تجاوزت 08:10. سجل تصريحاً.", "error"); return; }

        const late = mins > 475 ? mins - 475 : 0;
        db.unshift({
            day: now.toLocaleDateString('ar-EG',{weekday:'long'}),
            date: now.toLocaleDateString('ar-EG'),
            time: `${h%12||12}:${pad(m)} ${h>=12?'مساءً':'صباحاً'}`,
            late: late
        });
        localStorage.setItem('talkha_final_db', JSON.stringify(db));
        render(); msg(`✅ تم التسجيل بنجاح، يوم سعيد ${name}!`, "success");
    }

    function render() {
        const b = document.getElementById('log-body'), rem = document.getElementById('rem-disp'), sumL = document.getElementById('sum-late'), f = document.getElementById('progress-fill'), l = document.getElementById('p-label');
        b.innerHTML = ''; let sum = 0;
        db.forEach(i => {
            sum += i.late;
            b.innerHTML += `<tr style="color:${i.late>0?'red':'green'}">
                <td>${i.day}</td><td>${i.date}</td><td>${i.time}</td><td>${i.late>0?i.late+' د':'منتظم'}</td>
            </tr>`;
        });

        // تحديث الخانات المطلوبة
        sumL.innerText = sum + " د";
        rem.innerText = Math.max(0, 60-sum) + " د";

        let p = Math.min((sum / 60) * 100, 100);
        f.style.width = p + "%"; l.innerText = Math.floor(p) + "%";
        f.style.background = p < 50 ? "var(--green)" : (p < 85 ? "var(--gold)" : "var(--danger)");
        document.getElementById('perf-disp').innerText = sum < 15 ? "⭐️⭐️⭐️⭐️⭐️" : "⭐️⭐️⭐️⭐️";
        const now = new Date(), end = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        document.getElementById('days-left').innerText = `باقي ${end - now.getDate()} يوماً لنهاية الشهر`;
    }

    function isHol() {
        const n = new Date();
        if(n.getDay()===5) return "اليوم الجمعة إجازة";
        if(holidays.includes(n.getDate()+"/"+(n.getMonth()+1))) return "اليوم إجازة رسمية";
        return null;
    }

    function autoCheck(mins) {
        const today = new Date().toLocaleDateString('ar-EG');
        if(mins > 490 && !db.some(e=>e.date===today) && !isHol()) msg("🏠 لم يتم تسجيل حضورك اليوم حتى الآن.", "info");
    }

    function msg(t, c) { const x = document.getElementById('alert-box'); x.innerText=t; x.className=c; x.style.display="block"; }
    function pad(n) { return n<10?'0'+n:n; }
    function manual() { const t = prompt("الوقت (مثلاً 07:55):"); if(t && t.includes(":")) punch(...t.split(":").map(Number)); }
    function reset() { if (confirm("⚠️ هل أنت متأكد من تصفير سجلات الشهر بالكامل؟")) { localStorage.removeItem('talkha_final_db'); location.reload(); } }
</script>
</body>
</html>
