<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة حضور طلخا المركبة</title>
    <style>
        :root { --turquoise: #008b8b; --danger: #d32f2f; --green: #2e7d32; --blue: #007bff; --orange: #fd7e14; --navy: #001f3f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #eef2f3; margin: 0; padding: 10px; color: #1a1a1a; font-size: 16px; }
        
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; border: 1px solid #ddd; }
        
        .station-header { background: var(--navy); color: #ffd700; padding: 10px; text-align: center; font-size: 14px; font-weight: bold; border-bottom: 2px solid #ffd700; }
        .header { background: linear-gradient(135deg, var(--turquoise) 0%, #00ced1 100%); color: white; padding: 25px 10px; text-align: center; }
        #digital-clock { font-size: 50px; font-weight: 800; font-family: 'Courier New', monospace; display: block; color: #e0ffff; }
        .date-display { margin-top:8px; font-weight: bold; font-size: 19px; background: rgba(0,0,0,0.1); padding: 5px 15px; border-radius: 20px; display: inline-block; }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; background: #f0f7f7; }
        .dash-card { background: white; padding: 12px 5px; border-radius: 15px; text-align: center; border: 1px solid #d1e0e0; cursor: pointer; }
        .dash-label { font-size: 11px; color: #777; font-weight: bold; display: block; margin-bottom: 4px; }
        .dash-val { font-size: 17px; font-weight: 800; color: var(--turquoise); }

        .user-info-section { padding: 15px; background: #fff; }
        .info-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; }
        .info-input { width: 100%; border: 2px solid #eee; border-radius: 12px; padding: 12px; font-size: 15px; font-weight: bold; text-align: center; outline: none; }

        .actions { padding: 0 15px 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 18px; font-size: 19px; font-weight: bold; cursor: pointer; color: white; box-shadow: 0 5px 0 #005f5f; }
        .btn-manual { background: #fff; border: 2px dashed var(--turquoise); color: var(--turquoise); font-size: 15px; padding: 12px; box-shadow: none; }

        .table-wrap { padding: 5px; max-height: 280px; overflow-y: auto; background: #fafafa; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        th { padding: 12px 5px; background: #e0f2f2; color: var(--turquoise); position: sticky; top: 0; }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; font-weight: bold; }
        .del-btn { color: var(--danger); background: none; border: none; font-size: 20px; cursor: pointer; }

        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-box { background: white; width: 85%; max-width: 350px; border-radius: 25px; padding: 25px; text-align: center; }
        .time-select { padding: 10px; border-radius: 12px; border: 2px solid var(--turquoise); font-size: 24px; font-weight: bold; width: 80px; text-align: center; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <div class="station-header">محطة كهرباء طلخا المركبة ⚡</div>
    
    <div class="header">
        <span id="digital-clock">00:00:00</span>
        <div class="date-display" id="date-text">-- / -- / ----</div>
    </div>

    <div class="dashboard">
        <div class="dash-card"><span class="dash-label">الموظف</span><span id="dash-name" class="dash-val">---</span></div>
        <div class="dash-card"><span class="dash-label">البصمة</span><span id="dash-code" class="dash-val">---</span></div>
        <div class="dash-card"><span>حضورك</span><br><span id="today-punch" class="dash-val">--:--</span></div>
        
        <div class="dash-card"><span>تأخير (د)</span><br><span id="sum-late" class="dash-val" style="color:var(--danger)">0</span></div>
        <div class="dash-card"><span>رصيد دقايق</span><br><span id="rem-mins" class="dash-val" style="color:var(--green)">60</span></div>
        <div class="dash-card" onclick="editManualBalance('reg')">
            <span class="dash-label">اعتيادي ✍️</span>
            <span id="reg-left" class="dash-val" style="color:var(--blue)">30</span>
        </div>
        <div class="dash-card" onclick="editManualBalance('emg')">
            <span class="dash-label">عارضة ✍️</span>
            <span id="emg-left" class="dash-val" style="color:var(--orange)">7</span>
        </div>
        <div class="dash-card" onclick="resetSystem()" style="grid-column: span 2;">
            <span class="dash-label">الإعدادات</span>
            <span class="dash-val">إعادة ضبط النظام ⚙️</span>
        </div>
    </div>

    <div class="user-info-section">
        <div class="info-row">
            <input type="text" id="u-name" class="info-input" placeholder="الاسم" oninput="saveUserInfo()">
            <input type="text" id="u-id" class="info-input" placeholder="الكود" oninput="saveUserInfo()">
        </div>
    </div>

    <div class="actions">
        <button id="main-punch-btn" class="btn-main" style="background:var(--turquoise);" onclick="handlePunch(null, null)">تسجيل بصمة الآن 📲</button>
        <button id="manual-punch-btn" class="btn-main btn-manual" onclick="openManualWheel()">تسجيل يدوي (بأثر رجعي) ✍️</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead><tr><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>حذف</th></tr></thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>
</div>

<div id="modalOverlay">
    <div class="modal-box">
        <h3 style="color:var(--turquoise);">تحديد وقت الحضور</h3>
        <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin:20px 0; direction:ltr;">
            <select id="wheel-hr" class="time-select"></select>
            <span style="font-size:24px; font-weight:bold;">:</span>
            <select id="wheel-mn" class="time-select"></select>
        </div>
        <button class="btn-main" style="background:var(--turquoise); box-shadow:none;" onclick="submitManual()">تأكيد ✅</button>
        <button class="btn-main" style="background:#eee; color:#666; margin-top:10px; box-shadow:none; font-size:15px;" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('t_db')) || [];
    let vacs = JSON.parse(localStorage.getItem('t_vacs')) || [];
    let bReg = localStorage.getItem('b_reg') || 30;
    let bEmg = localStorage.getItem('b_emg') || 7;

    function init() {
        fillWheels();
        document.getElementById('u-name').value = localStorage.getItem('u_n') || "";
        document.getElementById('u-id').value = localStorage.getItem('u_i') || "";
        updateTime(); setInterval(updateTime, 1000);
        render();
    }

    function fixAr(s) { return s.toString().replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d)); }

    function fillWheels() {
        const h = document.getElementById('wheel-hr'), m = document.getElementById('wheel-mn');
        for(let i=7; i<=15; i++) h.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=0; i<=59; i++) m.innerHTML += `<option value="${i}">${i < 10 ? '0' + i : i}</option>`;
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('digital-clock').innerText = now.toLocaleTimeString('en-GB');
        document.getElementById('date-text').innerText = now.getDate() + " / " + (now.getMonth() + 1) + " / " + now.getFullYear();
    }

    function saveUserInfo() {
        localStorage.setItem('u_n', document.getElementById('u-name').value);
        localStorage.setItem('u_i', document.getElementById('u-id').value);
        render();
    }

    function handlePunch(customH, customM) {
        const now = new Date();
        const h = customH !== null ? customH : now.getHours(), m = customM !== null ? customM : now.getMinutes();
        const tot = h * 60 + m, dateKey = now.toDateString();

        if([...db, ...vacs].find(e => e.fDate === dateKey)) return alert("مسجل اليوم مسبقاً!");

        if (tot > 490) {
            let c = prompt("الوقت تجاوز 8:10 ص! اختر:\n(١) اعتيادي\n(٢) عارضة\n(٣) تصريح");
            c = fixAr(c || "");
            if(c==="1") register(dateKey, '---', 0, 'اعتيادي');
            else if(c==="2") register(dateKey, '---', 0, 'عارضة');
            else if(c==="3") register(dateKey, formatTime(h, m), (tot-475), 'تصريح');
        } else {
            register(dateKey, formatTime(h, m), (tot>475?tot-475:0), 'منتظم');
        }
    }

    function register(fDate, time, late, type) {
        const now = new Date();
        // التاريخ هنا يشمل السنة كاملة للجدول
        const fullDateStr = now.getDate() + " / " + (now.getMonth() + 1) + " / " + now.getFullYear();
        const item = { id: Date.now(), fDate, dDate: fullDateStr, time, late, type };
        if(type==='اعتيادي'||type==='عارضة') vacs.unshift(item); else db.unshift(item);
        saveAndRender();
    }

    function formatTime(h, m) { return (h%12||12)+":"+(m<10?'0'+m:m)+(h>=12?' م':' ص'); }
    function openManualWheel() { document.getElementById('modalOverlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function submitManual() {
        const h = parseInt(document.getElementById('wheel-hr').value);
        const m = parseInt(document.getElementById('wheel-mn').value);
        handlePunch(h, m); closeModal();
    }

    function render() {
        const body = document.getElementById('log-body'); body.innerHTML = '';
        let lateSum = 0, rUsed = 0, eUsed = 0, found = false;
        const nowKey = new Date().toDateString();

        document.getElementById('dash-name').innerText = localStorage.getItem('u_n') || "---";
        document.getElementById('dash-code').innerText = fixAr(localStorage.getItem('u_i')) || "---";

        const all = [...db, ...vacs].sort((a,b) => b.id - a.id);
        all.forEach(e => {
            if(e.type==='منتظم'||e.type==='تصريح') lateSum += e.late;
            if(e.type==='اعتيادي') rUsed++; if(e.type==='عارضة') eUsed++;
            if(e.fDate === nowKey) { document.getElementById('today-punch').innerText = e.time; found = true; }

            body.innerHTML += `<tr style="background:${e.type==='منتظم'||e.type==='تصريح'?'':'#fffcf5'}">
                <td>${e.dDate}</td><td>${e.time}</td>
                <td style="color:${e.late>0?'red':(e.type==='منتظم'?'green':'blue')}">${e.type === 'منتظم' && e.late > 0 ? e.late + 'د' : e.type}</td>
                <td><button class="del-btn" onclick="deleteRow(${e.id})">🗑️</button></td>
            </tr>`;
        });
        
        document.getElementById('sum-late').innerText = lateSum;
        document.getElementById('rem-mins').innerText = Math.max(0, 60 - lateSum);
        document.getElementById('reg-left').innerText = bReg - rUsed;
        document.getElementById('emg-left').innerText = bEmg - eUsed;
        document.getElementById('main-punch-btn').disabled = found;
        document.getElementById('manual-punch-btn').style.display = found ? 'none' : 'block';
    }

    function editManualBalance(type) {
        let current = type === 'reg' ? bReg : bEmg;
        let val = prompt("تعديل الرصيد المتبقي:", current);
        if (val !== null) {
            let num = parseInt(fixAr(val));
            if (!isNaN(num)) {
                if (type === 'reg') { bReg = num; localStorage.setItem('b_reg', num); }
                else { bEmg = num; localStorage.setItem('b_emg', num); }
                render();
            }
        }
    }

    function deleteRow(id) { if(confirm("حذف السطر؟")) { db = db.filter(i => i.id !== id); vacs = vacs.filter(i => i.id !== id); saveAndRender(); } }
    function saveAndRender() { localStorage.setItem('t_db', JSON.stringify(db)); localStorage.setItem('t_vacs', JSON.stringify(vacs)); render(); }
    function resetSystem() { if(confirm("هل تريد مسح جميع البيانات والبدء من جديد؟")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
