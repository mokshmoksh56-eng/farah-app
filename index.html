<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرح للمطابخ | منظومة الإدارة الماسية</title>
    <style>
        :root {
            --primary: #0a3d62; --accent: #3c6382; --success: #218c74;
            --danger: #b33939; --warning: #ffb142; --light: #f1f2f6;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #dfe4ea; margin: 0; padding: 0; color: var(--primary); }

        /* الهيدر */
        .header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 50px 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .header h1 { margin: 0; font-size: 35px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { opacity: 0.8; font-size: 14px; margin-top: 5px; }

        /* لوحة التحكم */
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 1200px; margin: -30px auto 20px; padding: 0 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-card h4 { margin: 0; font-size: 12px; color: #777; }
        .stat-card div { font-size: 22px; font-weight: bold; margin-top: 5px; color: var(--primary); }

        /* البحث والأدوات */
        .tools-area { max-width: 1200px; margin: 20px auto; display: flex; flex-wrap: wrap; gap: 15px; padding: 0 20px; justify-content: center; }
        #searchField { flex: 1; min-width: 300px; padding: 15px 25px; border-radius: 50px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); outline: none; font-size: 16px; }
        .btn-backup { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-backup:hover { background: var(--primary); }

        /* شبكة الزبائن */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 30px; max-width: 1300px; margin: 20px auto; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.9); border-radius: 30px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #fff; position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .card.paid { border: 4px solid var(--success); background: #e6fff0; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #ddd; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; background: #fff; }

        /* منطقة المبالغ بالعربي */
        .arabic-box { background: #f0f7ff; padding: 10px; border-radius: 10px; margin-top: 5px; font-size: 13px; font-weight: bold; color: var(--accent); min-height: 20px; border-right: 4px solid var(--accent); }

        .payment-section { background: rgba(0,0,0,0.02); padding: 15px; border-radius: 20px; margin: 15px 0; border: 1px solid #eee; }
        .pay-row { display: grid; grid-template-columns: 120px 1fr; gap: 10px; margin-bottom: 10px; }

        .result-box { background: var(--primary); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-top: 10px; }
        .result-box .num { font-size: 24px; font-weight: bold; }
        .result-box .word { font-size: 14px; color: #00d2ff; margin-top: 5px; font-weight: bold; }

        .card-footer { display: flex; gap: 10px; margin-top: 20px; }
        .btn-card { flex: 1; padding: 12px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; transition: 0.3s; }
        .btn-save { background: var(--accent); }
        .btn-wa { background: var(--success); }
        .btn-card:hover { opacity: 0.9; transform: scale(1.02); }

        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 15px 30px; border-radius: 15px; display: none; z-index: 10000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="toast">✅ تم حفظ البيانات بأمان</div>

<div class="header">
    <h1>فرح للمطابخ</h1>
    <p>منظومة الإدارة المالية الذكية | النسخة الماسية المطورة</p>
</div>

<div class="stats-bar">
    <div class="stat-card"><h4>إجمالي الديون المعلقة</h4><div id="stat-total-debt">0 ج.م</div></div>
    <div class="stat-card"><h4>عدد الزبائن</h4><div id="stat-cust-count">0</div></div>
    <div class="stat-card"><h4>عمليات سداد مكتملة</h4><div id="stat-paid-count">0</div></div>
</div>

<div class="tools-area">
    <input type="text" id="searchField" placeholder="🔍 ابحث عن اسم الزبون..." onkeyup="search()">
    <button class="btn-backup" onclick="exportData()">💾 نسخة احتياطية للبيانات</button>
</div>

<div class="grid" id="mainGrid"></div>

<script>
    // مصفوفات التفقيط
    const units = ['', 'واحد', 'اثنان', 'ثلاثة', 'أربعة', 'خمسة', 'ستة', 'سبعة', 'ثمانية', 'تسعة', 'عشرة', 'أحد عشر', 'اثنا عشر', 'ثلاثة عشر', 'أربعة عشر', 'خمسة عشر', 'ستة عشر', 'سبعة عشر', 'ثمانية عشر', 'تسعة عشر'];
    const tens = ['', '', 'عشرون', 'ثلاثون', 'أربعون', 'خمسون', 'ستون', 'سبعون', 'ثمانون', 'تسعون'];
    const hundreds = ['', 'مائة', 'مائتان', 'ثلاثمائة', 'أربعمائة', 'خمسمائة', 'ستمائة', 'سبعمائة', 'ثمانمائة', 'تسعمائة'];

    function toArabic(n) {
        n = Math.floor(n); if (n === 0) return '';
        let res = '';
        if (n >= 1000) {
            let k = Math.floor(n / 1000);
            if (k === 1) res += 'ألف ';
            else if (k === 2) res += 'ألفان ';
            else if (k <= 10) res += units[k] + ' آلاف ';
            else res += tafqitBasic(k) + ' ألفاً ';
            n %= 1000;
        }
        res += tafqitBasic(n);
        return res.trim() + ' جنيهاً';
    }

    function tafqitBasic(n) {
        let text = '';
        if (n >= 100) { text += hundreds[Math.floor(n / 100)] + ' '; n %= 100; }
        if (n > 0) {
            if (text !== '') text += 'و ';
            if (n < 20) text += units[n];
            else {
                if (n % 10 > 0) text += units[n % 10] + ' و ' + tens[Math.floor(n / 10)];
                else text += tens[Math.floor(n / 10)];
            }
        }
        return text;
    }

    const grid = document.getElementById('mainGrid');
    const COUNT = 100;

    // إنشاء الكروت
    for (let i = 1; i <= COUNT; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${i}`;
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                <span style="font-weight:bold; color:var(--accent)">ملف زبون #${i}</span>
                <span id="date-${i}" style="font-size:10px; color:#aaa"></span>
            </div>
            
            <div class="input-group">
                <label>👤 اسم الزبون:</label>
                <input type="text" class="c-name" oninput="save(${i})">
            </div>

            <div class="input-group">
                <label>📱 موبايل:</label>
                <input type="tel" class="c-phone" oninput="save(${i})">
            </div>

            <div class="input-group">
                <label>💰 إجمالي الاتفاق:</label>
                <input type="number" class="c-total" oninput="update(${i})">
                <div class="arabic-box" id="t-word-${i}"></div>
            </div>

            <div class="payment-section">
                <label>💵 سجل الدفعات والتاريخ:</label>
                ${[1,2,3,4,5].map(n => `
                    <div class="pay-row">
                        <input type="date" class="p-date" oninput="save(${i})">
                        <input type="number" class="p-val" placeholder="المبلغ" oninput="update(${i})">
                    </div>
                `).join('')}
            </div>

            <div class="result-box">
                <span style="font-size:11px; opacity:0.7">المتبقي المطلوب سداده:</span>
                <div class="num" id="rem-n-${i}">0</div>
                <div class="word" id="rem-w-${i}"></div>
            </div>

            <div class="card-footer">
                <button class="btn-card btn-save" onclick="saveBtn(${i})">💾 حفظ البيانات</button>
                <button class="btn-card btn-wa" onclick="sendWA(${i})">📱 واتساب مطور</button>
            </div>
        `;
        grid.appendChild(card);
    }

    function update(id) {
        const card = document.getElementById(`card-${id}`);
        const total = parseFloat(card.querySelector('.c-total').value) || 0;
        document.getElementById(`t-word-${id}`).innerText = total > 0 ? toArabic(total) : '';

        const pays = card.querySelectorAll('.p-val');
        let paid = 0;
        pays.forEach(p => paid += (parseFloat(p.value) || 0));

        const rem = total - paid;
        document.getElementById(`rem-n-${id}`).innerText = rem.toLocaleString('ar-EG') + ' ج.م';
        document.getElementById(`rem-w-${id}`).innerText = rem > 0 ? toArabic(rem) : (rem < 0 ? 'يوجد زيادة سداد' : 'تم السداد بالكامل ✓');

        // تغيير اللون عند السداد الكامل
        if (rem <= 0 && total > 0) card.classList.add('paid');
        else card.classList.remove('paid');
        
        save(id);
        refreshStats();
    }

    function save(id) {
        const card = document.getElementById(`card-${id}`);
        const data = {
            n: card.querySelector('.c-name').value,
            p: card.querySelector('.c-phone').value,
            t: card.querySelector('.c-total').value,
            d: new Date().toLocaleDateString('ar-EG'),
            pays: Array.from(card.querySelectorAll('.pay-row')).map(r => ({
                dt: r.querySelector('.p-date').value,
                vl: r.querySelector('.p-val').value
            }))
        };
        localStorage.setItem(`farah_diamond_v7_${id}`, JSON.stringify(data));
        document.getElementById(`date-${id}`).innerText = "آخر تعديل: " + data.d;
    }

    function saveBtn(id) {
        save(id);
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    window.onload = () => {
        for (let i = 1; i <= COUNT; i++) {
            const s = localStorage.getItem(`farah_diamond_v7_${i}`);
            if (s) {
                const d = JSON.parse(s);
                const card = document.getElementById(`card-${i}`);
                card.querySelector('.c-name').value = d.n || '';
                card.querySelector('.c-phone').value = d.p || '';
                card.querySelector('.c-total').value = d.t || '';
                document.getElementById(`date-${i}`).innerText = d.d ? "آخر تعديل: " + d.d : '';
                const rows = card.querySelectorAll('.pay-row');
                d.pays.forEach((p, idx) => {
                    rows[idx].querySelector('.p-date').value = p.dt || '';
                    rows[idx].querySelector('.p-val').value = p.vl || '';
                });
                update(i);
            }
        }
        refreshStats();
    };

    function refreshStats() {
        let totalDebt = 0; let custCount = 0; let paidCount = 0;
        for (let i = 1; i <= COUNT; i++) {
            const s = localStorage.getItem(`farah_diamond_v7_${i}`);
            if (s) {
                const d = JSON.parse(s);
                if (d.n) {
                    custCount++;
                    let paid = 0; d.pays.forEach(p => paid += parseFloat(p.vl) || 0);
                    let rem = (parseFloat(d.t) || 0) - paid;
                    if (rem > 0) totalDebt += rem;
                    if (rem <= 0 && d.t > 0) paidCount++;
                }
            }
        }
        document.getElementById('stat-total-debt').innerText = totalDebt.toLocaleString('ar-EG') + ' ج.م';
        document.getElementById('stat-cust-count').innerText = custCount;
        document.getElementById('stat-paid-count').innerText = paidCount;
    }

    function sendWA(id) {
        const card = document.getElementById(`card-${id}`);
        const name = card.querySelector('.c-name').value || "العميل";
        const phone = card.querySelector('.c-phone').value;
        const total = card.querySelector('.c-total').value || "0";
        const totalW = document.getElementById(`t-word-${id}`).innerText;
        const remN = document.getElementById(`rem-n-${id}`).innerText;
        const remW = document.getElementById(`rem-w-${id}`).innerText;

        if(!phone) return alert("سجل رقم الموبايل أولاً");

        let msg = `*💎 كشف حساب: فرح للمطابخ 💎*%0A👤 *العميل:* ${name}%0A💰 *إجمالي الاتفاق:* ${total} ج.م%0A🔹 ${totalW}%0A----------------------------%0A*🗓️ سجل الدفعات المسجلة:*%0A`;
        
        const rows = card.querySelectorAll('.pay-row');
        let hasPay = false;
        rows.forEach((r, idx) => {
            const v = r.querySelector('.p-val').value;
            const d = r.querySelector('.p-date').value;
            if(v > 0) {
                hasPay = true;
                const dtTxt = d ? ` بتاريخ [${d}]` : '';
                msg += `✅ دفعة ${idx+1}: ${v} ج.م${dtTxt}%0A`;
            }
        });

        if(!hasPay) msg += `(لا توجد دفعات حالية)%0A`;

        msg += `----------------------------%0A💵 *المتبقي:* ${remN}%0A🔹 ${remW}%0A%0A*شكراً لثقتكم في فرح للمطابخ*`;

        let cp = phone.trim().startsWith('01') ? '2' + phone.trim() : phone.trim();
        window.open(`https://wa.me/${cp}?text=${msg}`, '_blank');
    }

    function search() {
        const v = document.getElementById('searchField').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            const name = c.querySelector('.c-name').value.toLowerCase();
            c.style.display = name.includes(v) ? "" : "none";
        });
    }

    function exportData() {
        let allData = "";
        for (let i = 1; i <= COUNT; i++) {
            const s = localStorage.getItem(`farah_diamond_v7_${i}`);
            if (s) allData += s + "\n";
        }
        if(!allData) return alert("لا توجد بيانات لحفظها");
        const blob = new Blob([allData], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'فرح_للمطابخ_نسخة_احتياطية.txt';
        a.click();
    }
</script>
</body>
</html>
