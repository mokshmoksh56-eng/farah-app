<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>u 2.5 - دقة 4 ملم</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #e74c3c;
            --size-bg: #e3f2fd;
            --size-text: #0d47a1;
            --qty-bg: #e8f5e9;
            --qty-text: #1b5e20;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h2 { text-align: center; color: var(--primary); margin: 10px 0; border-bottom: 3px solid var(--accent); padding-bottom: 5px; }

        .info-bar { text-align: center; font-size: 0.85em; color: #666; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 8px; }

        .input-card { background: #fcfcfc; border: 1px solid #ddd; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-right: 5px solid var(--primary); }
        
        .row { display: flex; gap: 10px; align-items: flex-end; }
        .col { flex: 1; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        .label-blue { color: var(--size-text); }
        .label-green { color: var(--qty-text); }

        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 18px; font-weight: bold; outline: none; text-align: center; }
        .input-size { background: var(--size-bg); color: var(--size-text); border-color: #bbdefb; }
        .input-qty { background: var(--qty-bg); color: var(--qty-text); border-color: #c8e6c9; }

        button { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-calc { background: var(--success); color: white; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); }

        .result-box { background: white; margin-top: 15px; border-radius: 12px; border: 1px solid #ddd; }
        .result-header { background: #34495e; color: white; padding: 12px; text-align: center; font-weight: bold; border-radius: 12px 12px 0 0; }
        .stock-row { padding: 12px; border-bottom: 1px solid #eee; }
        
        .visual-bar { display: flex; height: 50px; background: #eee; border-radius: 6px; overflow: hidden; border: 1px solid #ccc; margin: 10px 0; }
        .bar-segment { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: white; font-weight: bold; border-right: 1px solid rgba(255,255,255,0.4); transition: 0.3s; }
        .bar-used { background: #3498db; position: relative; }
        .bar-kerf { background: #333; } /* لون المنشار */
        .bar-waste { background: var(--danger); font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <h2>u 2.5</h2>
    <div class="info-bar">طول العود: 600 سم | سمك المنشار: 4 ملم (0.4 سم)</div>

    <div id="inputsContainer">
        <div class="input-card">
            <div class="row">
                <div class="col">
                    <label class="label-blue">المقاس (سم)</label>
