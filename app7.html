<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خزنتي - إحصائيات مخصصة</title>
    <style>
        :root {
            --primary: #4834d4;
            --success: #2ecc71;
            --danger: #ff4757;
            --loan: #f0932b;
            --bg: #f1f2f6;
            --gold: #d4af37;
            --bg-success: #e3fcef;
            --bg-danger: #ffeef0;
            --bg-loan: #fff9ee;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 8px; }
        .header-title { text-align: center; font-weight: bold; color: var(--primary); margin: 5px 0; font-size: 18px; border-bottom: 2px solid var(--gold); }

        .search-container { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 5px 0; }
        .search-bar { width: 100%; padding: 10px; border-radius: 20px; border: 2px solid var(--primary); font-size: 15px; outline: none; box-sizing: border-box; }

        /* المربعات الثلاثة الذكية */
        .stats { display: flex; gap: 5px; margin-bottom: 10px; }
        .stat-card { flex: 1; background: white; padding: 8px 2px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .stat-card span { font-size: 11px; color: #666; display: block; margin-bottom: 2px; }
        .stat-card b { font-size: 15px; display: block; transition: 0.3s; }
        .val-in { color: var(--success); }
        .val-out { color: var(--danger); }
        .val-net { color: var(--primary); }

        .main-card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 5px 10px rgba(0,0,0,0.05); margin-bottom: 12px; }
        
        .name-manage-area { background: #f9f9f9; padding: 8px; border-radius: 10px; margin-bottom: 10px; border: 1px dashed #ccc; }
        .names-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .name-tag { background: white; border: 1px solid var(--primary); padding: 2px 8px; border-radius: 15px; font-size: 11px; display: flex; align-items: center; gap: 5px; }
        .name-tag b { cursor: pointer; color: var(--danger); font-size: 14px; }

        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; width: 100%; box-sizing: border-box; margin-bottom: 6px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .btn { border: none; padding: 12px 2px; border-radius: 10px; color: white; font-weight: bold; font-size: 12px; }
        .btn-in { background: var(--success); } .btn-out { background: var(--danger); } .btn-loan { background: var(--loan); }

        .table-section { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #f8f9fa; padding: 6px; color: #666; font-size: 10px; }
        td { padding: 5px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.02); line-height: 1.2; }

        .row-in { background-color: var(--bg-success); }
        .row-out { background-color: var(--bg-danger); }
        .row-loan { background-color: var(--bg-loan); }

        .big-date { font-size: 17px; font-weight: 900; color: var(--primary); display: block; }
        .amt-text { font-size: 15px; font-weight: bold; }
        .del-btn { color: #bbb; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-title" id="mainTitle">خزنتي - إحصائيات عامة</div>

    <div class="search-container">
        <input type="text" id="search" class="search-bar" placeholder="🔍 ابحث في التاريخ أو البيان..." oninput="render()">
    </div>

    <div class="stats">
        <div class="stat-card"><span>الوارد</span><b id="tin" class="val-in">0</b></div>
        <div class="stat-card"><span>المنصرف</span><b id="tout" class="val-out">0</b></div>
        <div class="stat-card"><span>الصافي</span><b id="tnet" class="val-net">0</b></div>
    </div>

    <div class="main-card">
        <div class="name-manage-area">
            <div style="display: flex; gap: 5px;">
                <input type="text" id="newName" placeholder="أضف اسم جديد..." style="margin-bottom:0">
                <button onclick="addNewName()" style="background:var(--primary); color:white; border:none; border-radius:8px; padding:0 12px; font-weight:bold;">+</button>
            </div>
            <div class="names-list" id="namesDisplay"></div>
        </div>

        <select id="userSelect" onchange="render()"></select>
        <input type="number" id="phone" placeholder="رقم الواتساب">
        <input type="number" id="amount" placeholder="المبلغ">
        <input type="text" id="note" placeholder="البيان">
        
        <div class="btn-group">
            <button class="btn btn-in" onclick="save('in')">إيداع</button>
            <button class="btn btn-out" onclick="save('out')">سحب</button>
            <button class="btn btn-loan" onclick="save('loan')">سلفية</button>
        </div>
    </div>

    <div class="table-section">
        <table>
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>الاسم والبيان</th>
                    <th>المبلغ</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
    let names = JSON.parse(localStorage.getItem('GOLD_V4_NAMES')) || ["أحمد رمضان", "كريم رمضان", "أشرف النجار"];
    let db = JSON.parse(localStorage.getItem('GOLD_V4_DB')) || [];

    function addNewName() {
        const val = document.getElementById('newName').value.trim();
        if(val && !names.includes(val)) {
            names.push(val);
            saveToStorage();
            document.getElementById('newName').value = '';
            sync();
        }
    }

    function removeName(name) {
        if(confirm(`حذف "${name}"؟`)) {
            names = names.filter(n => n !== name);
            saveToStorage();
            sync();
        }
    }

    function saveToStorage() { localStorage.setItem('GOLD_V4_NAMES', JSON.stringify(names)); }

    function sync() {
        const sel = document.getElementById('userSelect');
        const display = document.getElementById('namesDisplay');
        const curr = sel.value;
        sel.innerHTML = '<option value="">عرض الكل (عام)</option>';
        names.sort().forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
        sel.value = curr;
        display.innerHTML = '';
        names.forEach(n => display.innerHTML += `<div class="name-tag">${n} <b onclick="removeName('${n}')">×</b></div>`);
    }

    function save(type) {
        const name = document.getElementById('userSelect').value;
        const phone = document.getElementById('phone').value;
        const amt = parseFloat(document.getElementById('amount').value);
        const note = document.getElementById('note').value;
        if(!name || isNaN(amt)) return alert("أدخل الاسم والمبلغ");

        db.unshift({
            id: Date.now(), name, phone: phone.startsWith('0') ? '2' + phone : phone,
            amt: (type === 'in' ? amt : -amt),
            type, note: note || (type === 'in' ? 'إيداع' : 'سحب'),
            date: new Date().toLocaleDateString('ar-EG')
        });
        localStorage.setItem('GOLD_V4_DB', JSON.stringify(db));
        document.getElementById('amount').value = '';
        render();
    }

    function render() {
        const selectedName = document.getElementById('userSelect').value;
        const query = document.getElementById('search').value.trim().toLowerCase();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        let tin = 0, tout = 0;
        
        // تحديث العنوان العلوي
        document.getElementById('mainTitle').innerText = selectedName ? `حساب: ${selectedName}` : "خزنتي - إحصائيات عامة";

        db.forEach(item => {
            // منطق حساب الإحصائيات (إذا اخترت شخص تظهر أرقامه هو فقط)
            if (!selectedName || item.name === selectedName) {
                if(item.amt > 0) tin += item.amt; 
                else tout += Math.abs(item.amt);
            }

            // منطق عرض الجدول (فلترة بالاسم والبحث)
            const matchName = !selectedName || item.name === selectedName;
            const matchSearch = item.name.toLowerCase().includes(query) || item.date.includes(query) || item.note.toLowerCase().includes(query);

            if(matchName && matchSearch) {
                let rowClass = item.amt > 0 ? 'row-in' : (item.type === 'loan' ? 'row-loan' : 'row-out');
                let amtColor = item.amt > 0 ? 'var(--success)' : (item.type === 'loan' ? 'var(--loan)' : 'var(--danger)');
                
                const userHistory = db.filter(r => r.name === item.name);
                const bal = userHistory.reduce((s, r) => s + r.amt, 0);
                const waMsg = `*كشف حساب: ${item.name}*\n💰 المبلغ: ${item.amt}\n⚖️ رصيدك: ${bal}`;

                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td><span class="big-date">${item.date}</span></td>
                        <td style="text-align:right">
                            <b>${item.name}</b><br>
                            <small style="color:#777">${item.note}</small> | 
                            <a href="https://wa.me/${item.phone}?text=${encodeURIComponent(waMsg)}" style="text-decoration:none">🟢</a>
                        </td>
                        <td class="amt-text" style="color:${amtColor}">${item.amt}</td>
                        <td><span class="del-btn" onclick="del(${item.id})">🗑️</span></td>
                    </tr>
                `;
            }
        });

        // تحديث المربعات بالأرقام المخصصة
        document.getElementById('tin').innerText = tin;
        document.getElementById('tout').innerText = tout;
        document.getElementById('tnet').innerText = tin - tout;
    }

    function del(id) { if(confirm("حذف؟")) { db = db.filter(i => i.id !== id); localStorage.setItem('GOLD_V4_DB', JSON.stringify(db)); render(); } }

    sync();
    render();
</script>
</body>
</html>
