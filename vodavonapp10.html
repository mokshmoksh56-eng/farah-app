<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vodafone Cash Smart Pay</title>
    <style>
        :root { --voda-red: #e60000; --whatsapp-green: #25D366; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; background: #ffffff;
            min-height: 100vh; display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 420px; padding: 20px; }

        .card { 
            background: white; border-radius: 25px; padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee;
        }

        .preview-screen {
            background: #fdfdfd; border: 2px solid #f0f0f0; padding: 20px;
            border-radius: 18px; margin-bottom: 20px; text-align: center;
        }
        .preview-number { font-size: 26px; color: var(--voda-red); font-weight: bold; display: block; }

        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        
        select, input {
            width: 100%; padding: 14px; margin-bottom: 15px; 
            border: 1.5px solid #eee; border-radius: 12px;
            background: #fafafa; font-size: 16px; box-sizing: border-box;
        }

        .btn-send {
            width: 100%; padding: 18px; background: var(--voda-red); color: white;
            border: none; border-radius: 15px; font-size: 18px; font-weight: bold;
            cursor: pointer; margin-bottom: 10px;
        }

        /* أزرار الواتساب والطباعة */
        .extra-actions { display: flex; gap: 10px; margin-top: 10px; }
        
        .btn-action {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; color: white; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-whatsapp { background: var(--whatsapp-green); }
        .btn-print { background: #333; }

        /* إخفاء الأزرار عند الطباعة فعلياً */
        @media print {
            .btn-send, .extra-actions, select, .btn-group, label, .btn-contact { display: none !important; }
            body { background: white; }
            .card { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card" id="printableArea">
        <h2 style="text-align: center; margin-top: 0; color: var(--voda-red);">إيصال تحويل ذكي</h2>

        <div class="preview-screen">
            <span id="simLabel" style="font-size: 12px; color: #777;">بيانات العملية</span>
            <span id="bigNumber" class="preview-number">----------</span>
            <span id="amountLabel" style="font-size: 14px; font-weight: bold;">المبلغ: 0 ج.م</span>
        </div>

        <div class="no-print">
            <label>شريحة الإرسال:</label>
            <select id="sim_select" onchange="updateUI()">
                <option value="SIM 1">الشريحة الأولى (SIM 1)</option>
                <option value="SIM 2">الشريحة الثانية (SIM 2)</option>
            </select>

            <label>رقم المستلم:</label>
            <input type="tel" id="target_phone" placeholder="010XXXXXXXX" maxlength="11" oninput="updateUI()">

            <label>المبلغ:</label>
            <input type="number" id="amount" placeholder="أدخل المبلغ" oninput="updateUI()">

            <button onclick="execute()" class="btn-send">تأكيد واتصال 📞</button>
        </div>

        <div class="extra-actions">
            <button onclick="sendWhatsApp()" class="btn-action btn-whatsapp">واتساب ✅</button>
            <button onclick="window.print()" class="btn-action btn-print">طباعة 🖨️</button>
        </div>
    </div>
</div>

<script>
    function updateUI() {
        document.getElementById('bigNumber').innerText = document.getElementById('target_phone').value || "----------";
        document.getElementById('simLabel').innerText = "عبر: " + document.getElementById('sim_select').value;
        document.getElementById('amountLabel').innerText = "المبلغ المطلوب: " + (document.getElementById('amount').value || "0") + " ج.م";
    }

    function execute() {
        const phone = document.getElementById('target_phone').value;
        const amt = document.getElementById('amount').value;
        if (phone.length === 11 && amt > 0) {
            window.location.href = `tel:*9*7*${phone}*${amt}%23`;
        } else { alert("بيانات غير مكتملة"); }
    }

    function sendWhatsApp() {
        const phone = document.getElementById('target_phone').value;
        const amt = document.getElementById('amount').value;
        if (phone && amt) {
            const msg = `أهلاً، سأقوم بتحويل مبلغ ${amt} جنيهاً إلى رقمك ${phone} عبر فودافون كاش الآن.`;
            window.open(`https://wa.me/2${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        } else { alert("اكتب الرقم والمبلغ أولاً"); }
    }
</script>

</body>
</html>
