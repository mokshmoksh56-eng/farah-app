<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة خدمات فودافون</title>
    <style>
        :root { --voda-red: #e60000; --voda-dark: #333; --voda-grey: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--voda-grey); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .header { background: var(--voda-red); color: white; padding: 20px; text-align: center; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(230,0,0,0.2); }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        h3 { color: var(--voda-dark); margin-top: 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: var(--voda-red); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; }
        .btn-outline { background: transparent; color: var(--voda-red); border: 1px solid var(--voda-red); }
        
        /* Modal Style */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .confirm-btn { background: var(--voda-red); color: white; flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; }
        .cancel-btn { background: #eee; color: #333; flex: 1; padding: 12px; border-radius: 10px; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 22px;">أكوادي المختصرة</h1>
        </div>

        <div class="card">
            <h3>💸 تحويل فودافون كاش</h3>
            <input type="tel" id="v_phone" placeholder="رقم الموبايل المحول له">
            <input type="number" id="v_amount" placeholder="المبلغ">
            <button onclick="showConfirm()" class="btn">إرسال الآن</button>
        </div>

        <div class="card">
            <h3>⚙️ خدمات الرصيد والشبكة</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <a href="tel:*868*1%23" class="btn btn-outline">معرفة رصيدي</a>
                <a href="tel:*878%23" class="btn btn-outline">معرفة رقمي</a>
                <a href="tel:*155%23" class="btn btn-outline">إلغاء الاشتراك</a>
                <a href="tel:*888%23" class="btn btn-outline">خدمة العملاء</a>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h4 style="margin:0 0 10px 0;">تأكيد التحويل</h4>
            <p id="confirmText" style="font-size: 15px; color: #555;"></p>
            <div class="modal-btns">
                <button onclick="executeTransfer()" class="confirm-btn">تأكيد</button>
                <button onclick="hideModal()" class="cancel-btn">تراجع</button>
            </div>
        </div>
    </div>

    <script>
        let pendingCode = "";

        function showConfirm() {
            const phone = document.getElementById('v_phone').value;
            const amount = document.getElementById('v_amount').value;

            if (phone.length >= 11 && amount > 0) {
                document.getElementById('confirmText').innerHTML = 
                    `سيتم طلب كود تحويل <br><b>${amount} جنيه</b> إلى <b>${phone}</b><br><br>هل أنت متأكد؟`;
                pendingCode = "tel:*9*7*" + phone + "*" + amount + "%23";
                document.getElementById('modal').style.display = 'flex';
            } else {
                alert("برجاء إدخال بيانات صحيحة");
            }
        }

        function hideModal() { document.getElementById('modal').style.display = 'none'; }

        function executeTransfer() {
            window.location.href = pendingCode;
            hideModal();
        }
    </script>

</body>
</html>
