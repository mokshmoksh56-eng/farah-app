<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vodafone Cash - Red Edition</title>
    <style>
        :root { 
            --voda-red: #e60000; /* أحمر فودافون الرسمي */
            --dark-gray: #333333;
            --bg-light: #f4f4f4;
            --white: #ffffff;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; background: var(--bg-light);
            display: flex; justify-content: center; padding: 20px;
        }

        .app-card { 
            width: 100%; max-width: 400px; background: var(--white); 
            border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 30px rgba(230, 0, 0, 0.1);
            border-top: 6px solid var(--voda-red);
        }

        /* Tabs */
        .tabs {
            display: flex; background: #f0f0f0; border-radius: 12px;
            margin-bottom: 25px; padding: 4px;
        }

        .tab-btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; color: #666; transition: 0.3s;
        }

        .tab-btn.active { background: var(--voda-red); color: white; }

        /* SIM Selector */
        .sim-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .sim-option {
            flex: 1; padding: 10px; border: 2px solid #eee;
            border-radius: 10px; text-align: center; cursor: pointer;
            font-weight: bold; color: #888;
        }
        .sim-option.active { border-color: var(--voda-red); color: var(--voda-red); background: rgba(230, 0, 0, 0.05); }

        .info-panel {
            background: #fffafa; border: 1px solid rgba(230, 0, 0, 0.2);
            border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 20px;
        }

        .code-preview { direction: ltr; font-family: monospace; font-size: 20px; color: var(--voda-red); font-weight: bold; }

        label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: bold; }

        input {
            width: 100%; padding: 14px; margin-bottom: 15px; 
            border: 1.5px solid #ddd; border-radius: 12px;
            font-size: 16px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--voda-red); }

        .btn-main {
            width: 100%; padding: 16px; background: var(--voda-red); 
            color: white; border: none; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { 
            background: white; width: 85%; max-width: 320px; padding: 25px; 
            border-radius: 20px; text-align: center; 
        }

        .confirm-btn { background: var(--voda-red); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .cancel-btn { background: none; color: #999; border: none; padding: 10px; cursor: pointer; margin-top: 5px; width: 100%; }

        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

<div class="app-card">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: var(--voda-red); margin: 0;">فودافون كاش</h2>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('transfer', this)">تحويل</button>
        <button class="tab-btn" onclick="switchTab('balance', this)">الرصيد</button>
    </div>

    <label>اختر الشريحة:</label>
    <div class="sim-selector">
        <div class="sim-option active" id="sim1" onclick="setSim(1)">SIM 1</div>
        <div class="sim-option" id="sim2" onclick="setSim(2)">SIM 2</div>
    </div>

    <div id="transfer" class="section active">
        <div class="info-panel">
            <div id="liveCode" class="code-preview">*9*7*الرقم*المبلغ#</div>
        </div>
        <input type="tel" id="ph" placeholder="رقم الموبايل" maxlength="11" oninput="update()">
        <input type="number" id="am" placeholder="المبلغ" oninput="update()">
        <button onclick="check()" class="btn-main">تحويل الآن 📞</button>
    </div>

    <div id="balance" class="section">
        <div class="info-panel">
            <p style="margin: 0 0 10px 0; font-size: 14px; color: #666;">كود الاستعلام عن الرصيد:</p>
            <div class="code-preview">*9*13#</div>
        </div>
        <button onclick="getBalance()" class="btn-main" style="background: var(--dark-gray);">اطلب الكود 🔍</button>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3 style="color: var(--voda-red); margin-top: 0;">تأكيد التحويل</h3>
        <p style="font-size: 14px; color: #555;">هل أنت متأكد من مراجعة الرقم والمبلغ؟</p>
        <div id="mPh" style="font-size: 22px; font-weight: bold; margin: 10px 0;"></div>
        <div id="mAm" style="font-weight: bold; color: var(--voda-red); font-size: 18px; margin-bottom: 15px;"></div>
        <button class="confirm-btn" onclick="go()">نعم، تأكيد التحويل</button>
        <button class="cancel-btn" onclick="closeM()">إلغاء</button>
    </div>
</div>

<script>
    let currentSim = 1;

    function switchTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function setSim(n) {
        currentSim = n;
        document.getElementById('sim1').classList.toggle('active', n === 1);
        document.getElementById('sim2').classList.toggle('active', n === 2);
    }

    function update() {
        const p = document.getElementById('ph').value || "الرقم";
        const a = document.getElementById('am').value || "المبلغ";
        document.getElementById('liveCode').innerText = `*9*7*${p}*${a}#`;
    }

    function check() {
        const p = document.getElementById('ph').value;
        const a = document.getElementById('am').value;
        if(p.length === 11 && a > 0) {
            document.getElementById('mPh').innerText = p;
            document.getElementById('mAm').innerText = a + " ج.م";
            document.getElementById('modal').style.display = 'flex';
        } else { alert("يرجى إدخال بيانات صحيحة"); }
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function go() {
        const p = document.getElementById('ph').value;
        const a = document.getElementById('am').value;
        closeM();
        alert(`برجاء الضغط على اتصال من (SIM ${currentSim})`);
        window.location.href = `tel:*9*7*${p}*${a}%23`;
    }

    function getBalance() {
        alert(`برجاء الضغط على اتصال من (SIM ${currentSim})`);
        window.location.href = `tel:*9*13%23`;
    }
</script>

</body>
</html>
